<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Alumno </title>
    <link rel="icon" href="../assets/RuleMind.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/estilos.css">
    <link rel="stylesheet" href="../css/alumno.css" />
</head>
<body>
    <div class="panel-wrapper">
        
        <!-- SECCIÓN DE SELECCIÓN DE REGLAS -->
        <!-- Este bloque se oculta cuando el alumno elija una regla -->
        <div id="seccion-seleccion-reglas">
            <div class="header-container">
                <h1 class="main-title">Actividades Disponibles</h1>
                <h2 id="subtitulo-reglas" style="color: #ccc; font-size: 1.2em;">Seleccione una regla</h2>
            </div>

            <!-- Aca se carga las 6 por pagina -->
            <div id="contenedor-reglas" class="reglas-grid">
                <p>Cargando reglas...</p>
            </div>
            
            <!-- Controles de navegación de reglas -->
            <div id="paginacion-reglas" class="paginacion-reglas"></div>
        </div>

        <!-- SECCIÓN DE ACTIVIDADES (Empieza OCULTO) -->
        <!-- Se muestra solo cuando el alumno toque "Entrar" -->
        <div id="seccion-actividades-dinamicas" style="display: none;">
            <div class="header-container">
                <h1 id="nivelTitulo" class="main-title">Nombre de la Regla</h1>
                <h2 id="puntaje">Puntaje: 0</h2>
                
                <div id="activitiesList" class="activity-container">
                    <!-- Aca se carga la actividad y el botón de volver -->
                </div>
            </div>
            
            <!-- Paginación de actividades -->
            <div id="paginacion-actividades" class="paginacion"></div>
        </div>

        <!-- BOTÓN CERRAR SESIÓN  -->
        <div class="logout-container-alumno">
            <button id="logoutBtnAlumno" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Scripts -->
    <script src="../js/logout.js"></script>
    <script src="../js/alumno.js"></script>
</body>
</html>
